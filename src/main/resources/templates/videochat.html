<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Videochat — Link&Live</title>
    <link rel="stylesheet" href="/css/videochat.css">
    <script src="/js/sockjs.min.js"></script>
    <script src="/js/stomp.min.js"></script>
    <!-- AdMob Web -->
    <script async
        src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-2409318039378512~6163972062"
        crossorigin="anonymous"></script>
</head>

<body>
    <div class="ad-banner">Publicidade — Banner permanente durante videochat</div>
    <div class="video-container">
        <div class="stranger-video">
            <!-- Vídeo do outro usuário -->
        </div>
        <div class="my-video">
            <!-- Seu vídeo (PIP) -->
        </div>
        <button class="report-btn" title="Reportar usuário">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 4H20L12 12L4 4Z" stroke="#f44336" stroke-width="2" />
                <path d="M12 12V20" stroke="#f44336" stroke-width="2" />
            </svg>
        </button>
        <div class="controls">
            <button class="btn btn-end" id="end-btn">SAIR</button>
            <button class="btn btn-next" id="next-btn">NEXT</button>
        </div>
    </div>
    <!-- Anúncio intersticial de 3s -->
    <div class="ad-dialog" id="ad-dialog" style="display: none;">
        <div class="ad-dialog-content">
            <h3>Anúncio Patrocinado</h3>
            <!-- AdMob Interstitial -->
            <ins class="adsbygoogle" style="display:block" data-ad-client="ca-app-pub-2409318039378512~6163972062"
                data-ad-slot="3185814305" data-ad-format="rectangle" data-full-width-responsive="false"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
            <p>Aguarde <span id="ad-timer">3</span> segundos.</p>
        </div>
    </div>
    <script src="/js/videochat.js"></script>
</body>

</html>
