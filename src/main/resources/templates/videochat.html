<!-- src/main/resources/templates/videochat.html -->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Videochat — Link&Live</title>
    <link rel="stylesheet" href="/css/videochat.css">
    <!-- Global AdSense Script -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6377064826829777"
        crossorigin="anonymous"></script>
    <script src="/js/sockjs.min.js"></script>
    <script src="/js/stomp.min.js"></script>
</head>

<body>
    <!-- Top Banner (Permanente, permitido pelo AdSense) -->
    <div class="ad-banner">
        <ins class="adsbygoogle" style="display:block" data-ad-format="autorelaxed"
            data-ad-client="ca-pub-6377064826829777" data-ad-slot="7086187402"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="video-container">
        <div class="stranger-video">
            <!-- Vídeo do outro usuário -->
        </div>
        <div class="my-video">
            <!-- Seu vídeo (PIP) -->
        </div>
        <button class="report-btn" title="Reportar usuário">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 4H20L12 12L4 4Z" stroke="#f44336" stroke-width="2" />
                <path d="M12 12V20" stroke="#f44336" stroke-width="2" />
            </svg>
        </button>
        <div class="controls">
            <button class="btn btn-end" id="end-btn">SAIR</button>
            <button class="btn btn-next" id="next-btn">NEXT</button>
        </div>
    </div>

    <!-- Interstitial: SEM ANÚNCIO REAL (só contador) -->
    <div class="ad-dialog" id="ad-dialog" style="display: none;">
        <div class="ad-dialog-content">
            <h3>Publicidade</h3>
            <p>Aguarde <span id="ad-timer">3</span> segundos.</p>
        </div>
    </div>

    <script src="/js/videochat.js"></script>
</body>

</html>
