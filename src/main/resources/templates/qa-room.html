<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${room.title + ' — Link&Live'}">Sala Q&A — Link&Live</title>
  <link rel="stylesheet" href="/css/qa-room.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6377064826829777"
   crossorigin="anonymous"></script>
  <!-- <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script> -->
  <!-- <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script> -->
  <script src="/js/sockjs.min.js"></script>
  <script src="/js/stomp.min.js"></script>

</head>

<body>
  <div class="header">
    <a href="/">← VOLTAR</a>
    <div>
      <div class="room-title" th:text="${room.title}">Pergunte-me qualquer coisa...</div>
      <div class="visitor-count" id="visitor-count">Carregando...</div>
    </div>
    <button class="share-btn" id="share-btn">🔗</button>
  </div>

  <!-- Preview de Resposta -->
  <div class="reply-preview" id="reply-preview" style="display: none;">
    <span class="reply-to" id="reply-to-name">...</span>
    <span class="reply-timestamp" id="reply-timestamp">...</span>
    <div class="reply-snippet" id="reply-snippet">...</div>
    <button class="reply-cancel" id="reply-cancel">×</button>
  </div>

  <div class="chat-container">
    <div class="messages" id="messages">
      <div th:each="msg : ${allMessages}" th:data-id="${msg.id}" th:data-author-uuid="${msg.author.uuid}"
        th:data-text="${msg.text}" th:data-timestamp="${#temporals.format(msg.createdAt, 'HH:mm')}"
        th:data-author-name="${msg.author.username}"
        th:class="${msg.author.uuid.toString() == visitorUuid ? 'message right' : 'message left'}">
        <div class="avatar" th:text="${#strings.substring(msg.author.username, 0, 2)}">A</div>
        <div class="message-content-wrap">
          <div class="message-bubble" th:utext="${#strings.escapeXml(msg.text)}">...</div>
          <div class="reactions">
            <span class="reaction">👍 <span th:text="${msg.upvotes}">0</span></span>
            <span class="reaction">😂 0</span>
            <span class="reaction">⭐ 0</span>
          </div>
          <button class="reply-btn">Reply</button>
        </div>
      </div>
    </div>

    <form id="messageForm" class="input-area">
      <input type="hidden" id="replyToMessageId" />
      <input type="text" id="messageInput" class="message-input" placeholder="Digite sua pergunta ou resposta..."
        required />
      <button type="submit" class="send-btn">➤</button>
    </form>
  </div>

  <div class="ad-banner">Publicidade</div>

  <!-- Action Sheet Mobile -->
  <div id="action-sheet" class="action-sheet" style="display: none;">
    <div class="action-sheet-content">
      <button id="action-reply" class="action-btn">Responder</button>
      <button id="action-cancel" class="action-btn cancel">Cancelar</button>
    </div>
  </div>

  <script src="/js/qa-room.js"></script>

</body>

</html>
