                <div class="input-container">
                    <input type="text" name="roomLink" id="room-link" class="input"
                        placeholder="https://linkandlive.app/room/abc123" required />
                    <button type="button" class="paste-btn" id="paste-btn">Paste</button>
                </div>
            </div>
            <button type="submit" class="btn">Entrar na Sala</button>
        </form>
