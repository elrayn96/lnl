# Application name
spring.application.name=Link&Live

# Database config
# spring.datasource.url=jdbc:postgresql://localhost:5432/lnl_teste
# spring.datasource.username=postgres
# spring.datasource.password=postgres


spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lnl_teste}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000



# JPA Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server port
server.port=${PORT:8080}
server.forward-headers-strategy=framework
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json,image/svg+xml
server.compression.min-response-size=1024
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

